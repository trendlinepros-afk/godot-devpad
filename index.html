<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy: the renderer never makes outbound network calls
      (all AI/provider traffic happens in the Electron main process), so we lock
      down connect-src to the local MCP server only. Images allow data: URIs for
      screenshot thumbnails.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://localhost:3727 http://127.0.0.1:3727; font-src 'self' data:;"
    />
    <title>DevPad</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
